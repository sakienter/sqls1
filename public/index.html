<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>S級リーグS1</title>
  <meta name="description" content="S級リーグS1の大会結果ページです。Googleスプレッドシート由来のデータをJSONとして読み込み、公開用の表として表示します。" />

  <meta property="og:title" content="S級リーグS1" />
  <meta property="og:description" content="スプレッドシート風の大会結果公開ページ" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">Result</p>

      <h1 id="event-title">S級リーグS1</h1>

      <p class="lead">
        Googleスプレッドシートで編集した大会結果をJSONとして読み込み、公開用の表として表示しています。
      </p>

      <div class="meta-line">
        <span id="data-status">読み込み中...</span>
        <span id="updated-at"></span>
      </div>
    </header>

    <section class="score-card">
      <div class="section-title purple">ポイント集計</div>

      <div class="table-wrap">
        <table id="points-table" aria-label="ポイント集計表">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="score-card">
      <div class="section-title orange">順位集計</div>

      <div class="table-wrap">
        <table id="placements-table" aria-label="順位集計表">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer class="footer-note">
      <p>
        Googleスプレッドシート → Apps Script →
        <code>/api/results</code> → この画面、という流れで表示しています。
      </p>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
