<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>S級リーグS1</title>
  <meta
    name="description"
    content="S級リーグS1の大会結果ページです。Googleスプレッドシート由来のデータをJSONとして読み込み、公開用の表として表示します。"
  />

  <meta property="og:title" content="S級リーグS1" />
  <meta property="og:description" content="スプレッドシート風の大会結果公開ページ" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">Result</p>

      <h1 id="event-title">S級リーグS1</h1>

      <p class="lead">
        S級リーグS1の総合結果と、各DAYの試合結果を掲載しています。
      </p>

      <div class="meta-line">
        <span id="data-status">読み込み中...</span>
        <span id="updated-at"></span>
      </div>
    </header>

    <section class="score-card">
      <div class="section-title purple">Total stats</div>

      <div class="table-wrap">
        <table id="summary-table" aria-label="総合順位表">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="score-card">
      <div class="section-title orange">DAY別結果</div>

      <div id="day-tabs" class="day-tabs" aria-label="DAY切り替え"></div>

      <div class="day-current">
        <p class="day-kicker">Selected Day</p>
        <h2 id="day-title">DAY1</h2>
      </div>

      <section class="day-section">
        <div class="mini-section-title">Daily Score</div>

        <div class="table-wrap">
          <table id="daily-score-table" aria-label="日別スコア表">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="day-section">
        <div class="mini-section-title">ポイント集計</div>

        <div class="table-wrap">
          <table id="day-points-table" aria-label="DAY別ポイント集計表">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="day-section">
        <div class="mini-section-title">順位入力</div>

        <div class="table-wrap">
          <table id="day-placements-table" aria-label="DAY別順位入力表">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="day-section game-detail-section">
        <div class="mini-section-title">ゲーム別詳細</div>

        <div id="game-tabs" class="game-tabs" aria-label="ゲーム切り替え"></div>

        <div class="game-current">
          <div>
            <p class="game-kicker">Selected Game</p>
            <h3 id="game-title">GAME1</h3>
          </div>

          <div class="game-meta">
            <span id="game-start-time">開始: -</span>
            <span id="game-end-time">終了: -</span>
            <span id="game-ban">BAN: -</span>
            <span id="game-anomaly">異常: -</span>
          </div>
        </div>

        <div class="table-wrap">
          <table id="game-detail-table" aria-label="ゲーム別詳細表">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </section>

    <footer class="footer-note">
      <p>
        Googleスプレッドシート → Apps Script →
        <code>/api/results</code> → この画面、という流れで表示しています。
      </p>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
